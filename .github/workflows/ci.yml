name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Test
        run: pytest tests/ -v --tb=short

      - name: Test NumPy fallback
        run: pytest tests/ -q
        env:
          MASTERML_BACKEND: numpy

      - name: Check compiled capabilities
        run: python -c "from mastermlx.accel import backend_report; report = backend_report(); print(report); assert report['cython'] and report['cpp_distance']"

  benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -e ".[dev,compare]"
      - name: Benchmark
        run: python benchmarks/bench_models.py

  quality:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install quality tools
        run: pip install -e ".[dev]"
      - name: Lint maintained infrastructure
        run: >-
          ruff check
          mastermlx/base/checkpoint.py mastermlx/base/module.py mastermlx/base/estimator.py
          mastermlx/data/search.py mastermlx/data/search_core.py
          mastermlx/neural_net/mlp.py mastermlx/neural_net/mlp_core.py
          --select E4,E7,E9,F --ignore E501
      - name: Type check maintained infrastructure
        run: >-
          mypy
          mastermlx/base/checkpoint.py mastermlx/data/search_core.py
          mastermlx/neural_net/mlp.py mastermlx/neural_net/mlp_core.py
          --ignore-missing-imports
      - name: Check public API compatibility
        run: pytest tests/test_api_compat.py -q
